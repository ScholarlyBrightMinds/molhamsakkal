<head>

<meta name="description" content="About Molham Sakkal — researcher in AI × drug discovery, career journey, and research pillars.">

<link rel="icon" href="images/profile.png" type="image/png">

<body>

    <svg class="mol-2 amber" viewBox="0 0 100 100"><polygon points="50,20 78,38 68,68 32,68 22,38"/><line x1="78" y1="38" x2="92" y2="28"/><circle cx="94" cy="28" r="2"/></svg>
    <svg class="mol-3" viewBox="0 0 140 100"><polygon points="30,30 55,30 67,52 55,74 30,74 18,52"/><polygon points="67,30 92,30 104,52 92,74 67,74 55,52"/><line x1="104" y1="52" x2="120" y2="52"/><circle cx="123" cy="52" r="2.5"/></svg>
    <svg class="mol-4" viewBox="0 0 100 100"><polygon points="35,28 65,28 80,55 65,82 35,82 20,55"/><circle cx="50" cy="55" r="14" fill="none" stroke-dasharray="2 3"/></svg>

</div>

<nav class="nav" data-page="about"></nav>

<main>

    <section class="sub-hero">
        <p class="sub-meta">About</p>
        <h1>The <em>short</em> version.</h1>
        <p class="sub-lede" data-bind="aboutLede"></p>
    </section>

    <hr class="rule">

    <!-- ═══ NARRATIVE + TIMELINE ═══ -->
    <section class="about-grid reveal">
        <div class="about-text" data-bind="aboutParagraphs"></div>
        <div class="timeline" data-bind="timeline" aria-label="Career timeline"></div>
    </section>

    <hr class="rule">

    <!-- ═══ RESEARCH PILLARS ═══ -->
    <section class="reveal">
        <p class="sec-kicker">Research</p>
        <h2 class="sec-title">Three <em>pillars</em>.</h2>
        <div class="pillars-grid" data-bind="aboutPillars"></div>
    </section>

    <hr class="rule">

    <!-- ═══ AWARDS ═══ -->
    <section class="reveal">
        <p class="sec-kicker">Recognition</p>
        <h2 class="sec-title">Awards &amp; <em>honours</em>.</h2>
        <ul class="awards-list" data-bind="awards"></ul>
    </section>

</main>

<footer data-bind="footer"></footer>

<script src="scripts.js"></script>
</body>
</html>
