name: Monthly SerpApi Scholar Update

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday at 05:00 UTC (weekly)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 📊 Run SerpApi Fetcher
        # CRITICAL: You must set the SERPAPI_KEY secret in your repo settings.
        # serpapi_fetcher.py reads it via os.getenv('SERPAPI_KEY')
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: 'JO1OQj8AAAAJ'  # Molham's Google Scholar ID
        run: |
          set -euo pipefail
          python serpapi_fetcher.py

      - name: 📁 Upload data artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serpapi-data
          path: data/serpapi/
          retention-days: 7

      - name: 💾 Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-update Scholar data via SerpApi'
          file_pattern: |
            data/serpapi/*.json
            data/serpapi/*.csv
