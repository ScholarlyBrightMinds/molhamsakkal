name: Weekly Scholar + ORCID + OpenAlex Sync + SEO Build

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Fetch latest Scholar data via SerpApi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: 'JO1OQj8AAAAJ'
        run: |
          set -euo pipefail
          python serpapi_fetcher.py

      - name: Fetch ORCID public record
        env:
          ORCID_CLIENT_ID:     ${{ secrets.ORCID_CLIENT_ID }}
          ORCID_CLIENT_SECRET: ${{ secrets.ORCID_CLIENT_SECRET }}
          ORCID_ID:            '0000-0001-6081-1284'
        run: |
          set -euo pipefail
          python orcid_fetcher.py

      - name: Fetch OpenAlex author + works
        env:
          ORCID_ID:               '0000-0001-6081-1284'
          OPENALEX_AUTHOR_ID:     'A5072660555'
          OPENALEX_DISPLAY_NAME:  'Molham Sakkal'
          OPENALEX_MAILTO:        'Molham.sakkal@gmail.com'
        run: |
          set -euo pipefail
          python openalex_fetcher.py

      - name: Pre-render publications + metrics into static HTML (SEO)
        run: |
          set -euo pipefail
          python build_html.py

      - name: Bake ORCID-verified panel into about.html
        run: |
          set -euo pipefail
          python build_orcid_html.py

      - name: Bake OpenAlex research-topics panel into about.html
        run: |
          set -euo pipefail
          python build_openalex_html.py

      - name: Bake co-author network into publications.html
        run: |
          set -euo pipefail
          python build_coauthor_html.py

      - name: Bake interactive research-map into research.html
        # Reads data/openalex/openalex.json and bakes a force-directed
        # concept graph (1 center node + top concepts + top topics, with
        # weighted edges) into the RESEARCH-MAP marker block on
        # research.html. Also embeds the graph JSON for research-map.js
        # to pick up and run a spring simulation on top of the static SVG.
        run: |
          set -euo pipefail
          python build_research_map.py

      - name: Generate per-paper OG share cards
        # Pillow-based renderer that emits 1200x630 PNGs into images/og/
        # for each DOI-resolved publication plus one publications-summary
        # card used by publications.html OG meta. Idempotent — each PNG
        # is only rewritten if its byte content would change.
        run: |
          set -euo pipefail
          python og_card_generator.py

      - name: Update sitemap.xml lastmod for publications page
        run: |
          python - <<'PYEOF'
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          p = Path("sitemap.xml")
          if not p.exists():
              raise SystemExit(0)
          t = p.read_text(encoding="utf-8")
          pat = re.compile(
              r'(<url>\s*<loc>https://scholarlybrightminds.github.io/molhamsakkal/publications\.html</loc>)(.*?)(</url>)',
              re.DOTALL,
          )
          def _bump(m):
              body = m.group(2)
              if "<lastmod>" in body:
                  body = re.sub(r'<lastmod>[^<]+</lastmod>', f'<lastmod>{today}</lastmod>', body)
              else:
                  body = body + f'    <lastmod>{today}</lastmod>\n  '
              return m.group(1) + body + m.group(3)
          new = pat.sub(_bump, t)
          if new != t:
              p.write_text(new, encoding="utf-8")
              print(f"sitemap.xml: bumped publications lastmod to {today}")
          PYEOF

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serpapi-data
          path: data/serpapi/
          retention-days: 7

      - name: Commit updated data, HTML, and sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: weekly Scholar + ORCID + OpenAlex sync + SEO rebuild'
          file_pattern: |
            data/serpapi/*.json
            data/serpapi/*.csv
            data/orcid/*.json
            data/openalex/*.json
            publications.html
            about.html
            research.html
            theme.config.js
            sitemap.xml
            images/og/*.png
