<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Molham Sakkal · Cancer Biology &amp; Drug Delivery · Researcher &amp; Data Analyst">
<title>Molham Sakkal · Cancer Biology &amp; Drug Delivery</title>

<link rel="icon" href="images/profile.png" type="image/png">
<link rel="apple-touch-icon" href="images/profile.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Theme config (must load BEFORE styles so CSS vars are set) -->
<script src="theme.config.js"></script>

<!-- Styles -->
<link rel="stylesheet" href="styles.css">

<style>
    /* ── home-specific polish only ── */
    .home-pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-top: 2rem;
    }
    .hp-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.4rem 1.3rem;
        transition: all .3s var(--ease);
    }
    .hp-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: var(--shadow-card);
    }
    .hp-icon {
        width: 34px; height: 34px;
        border-radius: 8px;
        background: var(--accent-bg);
        display: grid;
        place-items: center;
        color: var(--accent);
        margin-bottom: 0.9rem;
    }
    .hp-icon svg { width: 18px; height: 18px; }
    .hp-title {
        font-family: var(--display);
        font-size: 1rem;
        font-weight: 500;
        margin-bottom: 0.35rem;
        color: var(--text);
    }
    .hp-desc {
        font-size: 0.82rem;
        color: var(--text-soft);
        line-height: 1.5;
    }
    @media (max-width: 760px) {
        .home-pillars { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<!-- ═══ MOLECULAR BACKGROUND (subtle) ═══ -->
<div class="mol-bg" aria-hidden="true">
    <svg class="mol-1" viewBox="0 0 100 100">
        <polygon points="30,25 55,25 67,50 55,75 30,75 18,50"/>
        <line x1="67" y1="50" x2="82" y2="50"/>
        <circle cx="85" cy="50" r="2.5"/>
        <line x1="24" y1="37" x2="24" y2="63" stroke-width="2"/>
        <line x1="60" y1="37" x2="60" y2="63" stroke-width="2"/>
    </svg>
    <svg class="mol-2 amber" viewBox="0 0 100 100">
        <polygon points="50,20 78,38 68,68 32,68 22,38"/>
        <line x1="50" y1="20" x2="50" y2="5"/>
        <circle cx="50" cy="3" r="2"/>
        <line x1="78" y1="38" x2="92" y2="28"/>
    </svg>
    <svg class="mol-3" viewBox="0 0 140 100">
        <polygon points="30,30 55,30 67,52 55,74 30,74 18,52"/>
        <polygon points="67,30 92,30 104,52 92,74 67,74 55,52"/>
        <line x1="104" y1="52" x2="120" y2="52"/>
        <circle cx="123" cy="52" r="2.5"/>
        <line x1="24" y1="42" x2="24" y2="62" stroke-width="2"/>
        <line x1="97" y1="42" x2="97" y2="62" stroke-width="2"/>
    </svg>
    <svg class="mol-4" viewBox="0 0 100 100">
        <polygon points="35,28 65,28 80,55 65,82 35,82 20,55"/>
        <circle cx="50" cy="55" r="14" fill="none" stroke-dasharray="2 3"/>
    </svg>
    <svg class="mol-5 amber" viewBox="0 0 100 100">
        <line x1="50" y1="50" x2="30" y2="30" stroke-width="1.5"/>
        <line x1="50" y1="50" x2="70" y2="30" stroke-width="1.5"/>
        <line x1="50" y1="50" x2="30" y2="70" stroke-width="1.5"/>
        <line x1="50" y1="50" x2="70" y2="70" stroke-width="1.5"/>
        <circle cx="30" cy="30" r="3"/>
        <circle cx="70" cy="30" r="3"/>
        <circle cx="30" cy="70" r="3"/>
        <circle cx="70" cy="70" r="3"/>
        <circle cx="50" cy="50" r="4"/>
    </svg>
</div>

<!-- Nav rendered by scripts.js based on config -->
<nav class="nav" data-page="home"></nav>

<main>
    <!-- ═══ HERO ═══ -->
    <section class="hero">
        <div class="hero-text">
            <span class="hero-status">
                <span class="live-dot"></span>
                <span data-bind="statusText">Currently · exploring</span>
            </span>
            <h1 data-bind="heading"></h1>
            <p class="hero-tagline" data-bind="tagline"></p>
            <p class="hero-bio" data-bind="bio"></p>
            <div class="chips" data-bind="chips"></div>
            <div class="social-links" data-bind="social"></div>
        </div>
        <div class="hero-image">
            <img data-bind="photo" alt="Profile">
        </div>
    </section>

    <hr class="rule">

    <!-- ═══ RESEARCH PILLARS PREVIEW ═══ -->
    <section class="reveal">
        <p class="sec-kicker">Research</p>
        <h2 class="sec-title">What I <em>work on</em>.</h2>
        <div class="home-pillars" data-bind="pillars"></div>
    </section>
</main>

<footer data-bind="footer"></footer>

<script src="scripts.js"></script>
</body>
</html>
